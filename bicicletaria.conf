<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /home/ratitu/Documents/claude/peloton

    WSGIDaemonProcess bicicletaria python-home=/home/ratitu/Documents/claude/peloton/venv python-path=/home/ratitu/Documents/claude/peloton
    WSGIProcessGroup bicicletaria
    WSGIScriptAlias / /home/ratitu/Documents/claude/peloton/bicicletaria.wsgi

    <Directory /home/ratitu/Documents/claude/peloton>
        Require all granted
    </Directory>

    <Directory /home/ratitu/Documents/claude/peloton/static>
        Require all granted
    </Directory>

    Alias /static/uploads /home/ratitu/Documents/claude/peloton/static/uploads

    ErrorLog ${APACHE_LOG_DIR}/bicicletaria_error.log
    CustomLog ${APACHE_LOG_DIR}/bicicletaria_access.log combined
</VirtualHost>